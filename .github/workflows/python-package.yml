name: Rent591Watcher

on:
  schedule:
  # scheduled hourly from 09:00 to 04:00 Taipei time (UTC+8)
    - cron: "0 1-20 * * *"
  workflow_dispatch:

jobs:
  scrape-latest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install requirements
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          URL: ${{ secrets.URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          MAX_PRICE: "35000"
          KEYWORDS: "大安,東門,大安森林公園,中山,中正,大同"
          WANTED_PAGES: "2"
        run: python main.py

      - name: Commit seen listing ids
        run: |
          if [ -z "$(git status --porcelain -- seen_ids.json)" ]; then
            echo "No seen_ids.json changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add seen_ids.json
          git commit -m "Update seen listing ids"
          git push
